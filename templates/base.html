<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NurseAI - Your Living Health Companion{% endblock %}</title>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'auto';
            if (theme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/z-index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tour.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/help.css') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'nurse-pink': '#FF6B9D',
                        'nurse-blue': '#4ECDC4',
                        'nurse-purple': '#9B59B6',
                        'nurse-green': '#2ECC71',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50 min-h-screen pt-20">
    {% block content %}{% endblock %}
    
    <!-- Reminder Pop-up Modal -->
    <div id="reminderModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-modal-backdrop flex items-center justify-center hidden">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full mx-4 animate-reminderPulse">
            <div class="bg-gradient-to-r from-orange-500 via-pink-500 to-purple-600 text-white p-6 rounded-t-2xl relative overflow-hidden">
                <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                <h3 class="text-2xl font-bold flex items-center gap-3 relative z-10">
                    <span class="material-symbols-outlined text-4xl animate-bounce">notifications_active</span>
                    <span>Time for Your Routine!</span>
                </h3>
            </div>
            <div class="p-6">
                <div id="reminderContent" class="space-y-4">
                    <!-- Reminder details will be inserted here -->
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="completeReminderFromPopup()" class="flex-1 bg-gradient-to-r from-green-500 to-emerald-500 text-white py-3 px-4 rounded-lg font-bold hover:shadow-lg transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">check_circle</span>
                        <span>Complete Now</span>
                    </button>
                    <button onclick="closeReminderModal()" class="flex-1 bg-gradient-to-r from-gray-400 to-gray-500 text-white py-3 px-4 rounded-lg font-bold hover:shadow-lg transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">schedule</span>
                        <span>Later</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
    @keyframes reminderPulse {
        0%, 100% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.02);
        }
    }
    
    .animate-reminderPulse {
        animation: reminderPulse 2s ease-in-out infinite;
    }
    </style>

    <script>
    // Global reminder checker
    let currentReminderId = null;
    let reminderCheckInterval = null;
    let lastCheckedMinute = -1;
    let snoozedReminders = new Map(); // Track snoozed reminders with timestamps (ID -> timestamp)
    const SNOOZE_DURATION_MS = 15 * 60 * 1000; // 15 minutes snooze duration
    let audioContextInitialized = false;
    let globalAudioContext = null;
    
    // Initialize audio context on user interaction
    function initAudioContext() {
        if (!audioContextInitialized) {
            globalAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            audioContextInitialized = true;
        }
        // Resume context if suspended
        if (globalAudioContext && globalAudioContext.state === 'suspended') {
            globalAudioContext.resume();
        }
    }
    
    // Add click listener to initialize audio on first user interaction
    document.addEventListener('click', initAudioContext, { once: true });
    
    // Play reminder sound using Web Audio API
    function playReminderSound() {
        // Ensure audio context is initialized
        if (!globalAudioContext) {
            globalAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // Resume if suspended
        if (globalAudioContext.state === 'suspended') {
            globalAudioContext.resume();
        }
        
        const gainNode = globalAudioContext.createGain();
        gainNode.connect(globalAudioContext.destination);
        gainNode.gain.value = 0.3;
        
        // Create a pleasant chime sound
        const frequencies = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        frequencies.forEach((freq, index) => {
            setTimeout(() => {
                const oscillator = globalAudioContext.createOscillator();
                oscillator.connect(gainNode);
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                oscillator.start();
                oscillator.stop(globalAudioContext.currentTime + 0.3);
            }, index * 150);
        });
    }
    
    // Request notification permission on first user interaction
    function requestNotificationPermission() {
        if (window.notificationSystem && !window.notificationSystem.permissionGranted) {
            window.notificationSystem.requestPermission();
        }
    }
    
    // Add listener to request permission on first click
    document.addEventListener('click', requestNotificationPermission, { once: true });
    
    // Check for reminders
    async function checkForReminders() {
        const now = new Date();
        const currentMinute = now.getHours() * 60 + now.getMinutes();
        const currentTime = now.getTime();
        
        // Clean up expired snoozes
        for (const [reminderId, snoozeTime] of snoozedReminders.entries()) {
            if (currentTime - snoozeTime > SNOOZE_DURATION_MS) {
                snoozedReminders.delete(reminderId);
            }
        }
        
        try {
            const response = await fetch('/api/check-reminders');
            if (response.ok) {
                const data = await response.json();
                if (data.reminders && data.reminders.length > 0) {
                    // Find first reminder that isn't currently snoozed
                    const reminder = data.reminders.find(r => {
                        const snoozeTime = snoozedReminders.get(r.id);
                        if (!snoozeTime) return true; // Not snoozed, show it
                        // Check if snooze has expired
                        return (currentTime - snoozeTime) > SNOOZE_DURATION_MS;
                    });
                    
                    if (reminder) {
                        // Show in-app modal
                        showReminderModal(reminder);
                        playReminderSound();
                        
                        // Try to show browser notification if page is not visible
                        if (document.hidden && window.notificationSystem) {
                            try {
                                const categoryEmojis = {
                                    'medication': '💊',
                                    'exercise': '🏃',
                                    'nutrition': '🥗',
                                    'hydration': '💧',
                                    'sleep': '😴',
                                    'meditation': '🧘',
                                    'appointment': '📅',
                                    'other': '✨'
                                };
                                const emoji = categoryEmojis[reminder.category] || '✨';
                                
                                window.notificationSystem.showNotification(
                                    `${emoji} Routine Reminder`,
                                    {
                                        body: `Time for: ${reminder.title}\n${reminder.description || ''}`,
                                        tag: `reminder-${reminder.id}`,
                                        requireInteraction: true
                                    }
                                );
                            } catch (err) {
                                console.log('Browser notification failed, using in-app modal instead');
                            }
                        }
                    }
                }
            } else if (response.status === 302 || response.status === 401) {
                // User not authenticated - silently ignore
                return;
            }
        } catch (error) {
            // Silently fail - likely user is not authenticated or network error
        }
    }
    
    // Show reminder modal
    function showReminderModal(reminder) {
        currentReminderId = reminder.id;
        const modal = document.getElementById('reminderModal');
        const content = document.getElementById('reminderContent');
        
        // Get category emoji
        const categoryEmojis = {
            'medication': '💊',
            'exercise': '🏃',
            'nutrition': '🥗',
            'hydration': '💧',
            'sleep': '😴',
            'meditation': '🧘',
            'appointment': '📅',
            'other': '✨'
        };
        
        const emoji = categoryEmojis[reminder.category] || '✨';
        
        content.innerHTML = `
            <div class="flex items-start gap-4">
                <div class="text-6xl">${emoji}</div>
                <div class="flex-1">
                    <h4 class="text-xl font-bold text-gray-800 mb-2">${reminder.title}</h4>
                    ${reminder.description ? `<p class="text-gray-600 mb-2">${reminder.description}</p>` : ''}
                    <div class="flex items-center gap-2 text-purple-600 font-semibold">
                        <span class="material-symbols-outlined">schedule</span>
                        <span>${reminder.time}</span>
                    </div>
                </div>
            </div>
        `;
        
        modal.classList.remove('hidden');
    }
    
    // Close reminder modal (snooze for 15 minutes)
    function closeReminderModal() {
        // Add to snoozed map with current timestamp
        if (currentReminderId) {
            snoozedReminders.set(currentReminderId, Date.now());
        }
        document.getElementById('reminderModal').classList.add('hidden');
        currentReminderId = null;
        
        // Show snooze confirmation
        const notification = document.createElement('div');
        notification.className = 'fixed top-20 right-4 bg-gradient-to-r from-blue-500 to-cyan-500 text-white px-6 py-3 rounded-lg shadow-xl z-notification flex items-center gap-2';
        notification.innerHTML = `
            <span class="material-symbols-outlined">schedule</span>
            <span class="font-semibold">Reminder snoozed for 15 minutes</span>
        `;
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.transition = 'opacity 0.3s';
            notification.style.opacity = '0';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }
    
    // Complete routine from reminder popup
    async function completeReminderFromPopup() {
        if (!currentReminderId) return;
        
        const routineId = currentReminderId;
        
        try {
            const response = await fetch(`/api/complete-routine/${routineId}`, {
                method: 'POST'
            });
            
            if (response.ok) {
                const data = await response.json();
                
                // Remove from snoozed map since it's now completed
                snoozedReminders.delete(routineId);
                
                // Close modal
                document.getElementById('reminderModal').classList.add('hidden');
                currentReminderId = null;
                
                // Show success notification
                const notification = document.createElement('div');
                notification.className = 'fixed top-20 right-4 bg-gradient-to-r from-green-500 to-emerald-500 text-white px-6 py-4 rounded-lg shadow-xl z-notification flex items-center gap-3';
                notification.innerHTML = `
                    <span class="material-symbols-outlined text-2xl">check_circle</span>
                    <span class="font-bold">Great job! Routine completed! 🎉</span>
                `;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.transition = 'opacity 0.3s';
                    notification.style.opacity = '0';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        } catch (error) {
            console.error('Error completing routine:', error);
        }
    }
    
    // Update reminder badge count
    async function updateReminderBadge() {
        const badge = document.getElementById('reminderBadge');
        if (!badge) return;
        
        try {
            const response = await fetch('/api/check-reminders');
            if (response.ok) {
                const data = await response.json();
                const count = data.reminders ? data.reminders.length : 0;
                
                if (count > 0) {
                    badge.textContent = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            } else if (response.status === 302 || response.status === 401) {
                // User not authenticated - hide badge silently
                badge.classList.add('hidden');
            }
        } catch (error) {
            // Silently fail - likely user is not authenticated or network error
            badge.classList.add('hidden');
        }
    }
    
    // Start checking for reminders when page loads
    if (typeof checkForReminders === 'function') {
        // Check immediately
        setTimeout(checkForReminders, 2000);
        
        // Update badge immediately
        setTimeout(updateReminderBadge, 2000);
        
        // Check every 10 seconds for faster, more accurate reminder alerts
        reminderCheckInterval = setInterval(() => {
            checkForReminders();
        }, 10000);
        
        // Update badge every 30 seconds (less frequent is okay for badge)
        setInterval(() => {
            updateReminderBadge();
        }, 30000);
    }
    </script>
    
    <script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tour.js') }}"></script>
    <script src="{{ url_for('static', filename='js/help.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
